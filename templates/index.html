<script>
const { createApp } = Vue;

createApp({
    delimiters: ['[[', ']]'],

    data() {
        const { protocol, hostname, port } = window.location;
        const httpBase = `${protocol}//${hostname}${port ? ':' + port : ''}`;

        return {
            apiUrl: httpBase,

            // Auth
            isAuthenticated: false,
            token: null,
            authMode: 'login',
            authError: null,

            loginForm: { username: '', password: '' },
            registerForm: { username: '', email: '', password: '' },

            // GPIO
            gpioPins: [],
            activityLogs: [],

            // Socket.IO
            socket: null,
            wsConnected: false,

            loading: true
        };
    },

    async mounted() {
        const savedToken = localStorage.getItem('gpio_token');
        if (savedToken) {
            this.token = savedToken;
            await this.verifyToken();
        } else {
            this.loading = false;
        }
    },

    methods: {
        /* ---------------- AUTH ---------------- */
        async login() {
            this.authError = null;
            try {
                const r = await fetch(`${this.apiUrl}/api/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(this.loginForm)
                });

                if (!r.ok) throw new Error("Invalid credentials");

                const data = await r.json();
                this.token = data.access_token;
                localStorage.setItem('gpio_token', this.token);

                this.isAuthenticated = true;
                await this.loadDashboard();
            } catch (e) {
                this.authError = e.message;
            }
        },

        async register() {
            this.authError = null;
            try {
                const r = await fetch(`${this.apiUrl}/api/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(this.registerForm)
                });

                if (!r.ok) throw new Error("Registration failed");

                const data = await r.json();
                this.token = data.access_token;
                localStorage.setItem('gpio_token', this.token);

                this.isAuthenticated = true;
                await this.loadDashboard();
            } catch (e) {
                this.authError = e.message;
            }
        },

        async verifyToken() {
            try {
                const r = await fetch(`${this.apiUrl}/api/user/me`, {
                    headers: { Authorization: `Bearer ${this.token}` }
                });

                if (!r.ok) throw new Error("Invalid token");

                this.isAuthenticated = true;
                await this.loadDashboard();
            } catch {
                localStorage.removeItem('gpio_token');
                this.token = null;
            } finally {
                this.loading = false;
            }
        },

        logout() {
            localStorage.removeItem('gpio_token');
            this.token = null;
            this.isAuthenticated = false;

            if (this.socket) {
                this.socket.disconnect();
                this.socket = null;
            }
        },

        /* ---------------- DASHBOARD ---------------- */
        async loadDashboard() {
            await this.loadGPIOPins();
            await this.loadActivityLogs();
            this.connectSocket();
        },

        async loadGPIOPins() {
            const r = await fetch(`${this.apiUrl}/api/gpio/pins`, {
                headers: { Authorization: `Bearer ${this.token}` }
            });
            const data = await r.json();
            this.gpioPins = data.pins;
        },

        async loadActivityLogs() {
            const r = await fetch(`${this.apiUrl}/api/logs?limit=50`, {
                headers: { Authorization: `Bearer ${this.token}` }
            });
            const data = await r.json();
            this.activityLogs = data.logs.map((l, i) => ({ ...l, id: i }));
        },

        /* ---------------- GPIO ---------------- */
        async togglePin(pin) {
            await fetch(`${this.apiUrl}/api/gpio/control`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    Authorization: `Bearer ${this.token}`
                },
                body: JSON.stringify({
                    pin: pin.pin,
                    state: pin.state ? 0 : 1
                })
            });
            // NO UI UPDATE HERE — backend will broadcast
        },

        /* ---------------- SOCKET.IO ---------------- */
        connectSocket() {
            if (this.socket) {
                this.socket.disconnect();
            }

            this.socket = io(); // same origin

            this.socket.on("connect", () => {
                this.wsConnected = true;
                console.log("🟢 Socket.IO connected");
            });

            this.socket.on("disconnect", () => {
                this.wsConnected = false;
                console.log("🔴 Socket.IO disconnected");
            });

            // Initial full state
            this.socket.on("gpio_snapshot", (data) => {
                this.gpioPins = data.pins;
            });

            // Incremental updates
            this.socket.on("gpio_update", (data) => {
                const pin = this.gpioPins.find(p => p.pin === data.pin);
                if (pin) pin.state = data.state;

                this.activityLogs.unshift({
                    id: Date.now(),
                    username: data.user,
                    action: "GPIO_CONTROL",
                    pin: data.pin,
                    state: data.state ? "HIGH" : "LOW",
                    timestamp: new Date().toISOString()
                });

                if (this.activityLogs.length > 50)
                    this.activityLogs.length = 50;
            });

            this.socket.on("connect_error", err => {
                console.error("Socket error:", err.message);
            });
        },

        /* ---------------- UI HELPERS ---------------- */
        getDeviceName(pin) {
            const d = this.gpioPins.find(p => p.pin === pin);
            return d ? d.name : `GPIO ${pin}`;
        },

        getLogIcon(action) {
            return {
                GPIO_CONTROL: "⚡",
                LOGIN: "🔐",
                REGISTER: "✨"
            }[action] || "📝";
        },

        formatLogAction(log) {
            if (log.action === "GPIO_CONTROL")
                return `${log.username} controlled ${this.getDeviceName(log.pin)}`;
            if (log.action === "LOGIN")
                return `${log.username} logged in`;
            if (log.action === "REGISTER")
                return `${log.username} registered`;
            return log.action;
        },

        formatTime(ts) {
            return new Date(ts).toLocaleString();
        }
    }
}).mount("#app");
</script>
